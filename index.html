<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>AstroLab Rush</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#001122">
<link rel="apple-touch-icon" href="/icon-180.png">  

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#001122">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
background:#001122;
font-family:'Comic Sans MS','Arial Rounded MT Bold',sans-serif;
-webkit-user-select:none;
-webkit-touch-callout:none;
-webkit-tap-highlight-color:transparent;
touch-action:none;
}

canvas{
display:block;
background:linear-gradient(to top,#000,#222);
}

#menuStars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

#menu{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:2000;
text-align:center;
}

#gameTitle{
font-size:48px;
color:white;
margin-bottom:20px;
text-shadow:2px 2px 4px black;
}

#menuImage{
display:block;
margin:0 auto 40px auto;
max-width:200px;
}

#rocketSelector{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
margin-bottom:20px;
}

#arrowLeft,#arrowRight{
font-size:46px;
color:white;
cursor:pointer;
opacity:0.6;
}

#arrowLeft:hover,#arrowRight:hover{
opacity:1;
}

#menuRocket{
width:220px;
height:160px;
}

button{
font-family:'Comic Sans MS','Arial Rounded MT Bold',sans-serif;
font-weight:bold;
font-size:22px;
padding:12px 30px;
background:#ffaa00;
border:4px solid black;
border-radius:15px;
cursor:pointer;
box-shadow:4px 4px 0 black;
margin:10px auto;
display:block;
width:200px;
}

button:hover{
background:#ff8800;
transform:translateY(-2px);
box-shadow:6px 6px 0 black;
}

#distance{
position:absolute;
top:10px;
left:20px;
background:#b6fcb6;
padding:10px 20px;
border-radius:15px;
border:3px solid black;
z-index:10;
font-weight:bold;
}

#gameOverText{
position:absolute;
top:15%;
left:50%;
transform:translateX(-50%);
font-size:48px;
color:#ff3b3b;
display:none;
z-index:3000;
}

#rejouer{
position:absolute;
top:60%;
left:50%;
transform:translateX(-50%);
display:none;
z-index:3000;
}

#objectifsBtn{
position:absolute;
top:70%;
left:50%;
transform:translateX(-50%);
display:none;
z-index:3000;
}

#shareScore{
position:absolute;
top:80%;
left:50%;
transform:translateX(-50%);
display:none;
z-index:3000;
}

/* OBJECTIVES */

#objectifList{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
z-index:4000;
}

#objectifPanel{
background:linear-gradient(#fffbe6,#f3edd6);
padding:25px;
border-radius:25px;
border:4px solid black;
width:340px;
max-width:90vw;
max-height:80vh;
overflow:auto;
}

#objectifPanel ul{
list-style:none;
padding:0;
}

.rocket-item{
padding:10px;
border:3px solid black;
border-radius:12px;
margin-bottom:8px;
font-weight:bold;
}

.rocket-unlocked{
background:#c8ffd8;
}

.rocket-locked{
background:#ddd;
opacity:0.7;
}

/* SETTINGS */

#settingsPanel{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
z-index:5000;
}

#settingsPanelContent{
background:linear-gradient(#fffbe6,#f3edd6);
padding:25px;
border-radius:25px;
border:4px solid black;
width:320px;
text-align:center;
}

#settingsPanelContent button{
width:100%;
margin-top:12px;
}

#scoreBoard{
position:absolute;
top:25%;
left:50%;
transform:translateX(-50%);
background:#fffbe6;
padding:20px;
border-radius:20px;
border:5px solid black;
display:none;
z-index:3000;
}

#success-banner{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:black;
color:#00ffcc;
padding:12px 20px;
border-radius:15px;
display:none;
z-index:6000;
}

#milestoneMessage{
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:42px;
opacity:0;
z-index:6000;
}

#levelFlash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
opacity:0;
z-index:500;
}

</style>
</head>

<body>

<canvas id="menuStars"></canvas>

<div id="menu">

<h1 id="gameTitle">AstroLab Rush</h1>

<img id="menuImage" src="menu.png">

<div id="rocketSelector">
<div id="arrowLeft">‹</div>
<canvas id="menuRocket"></canvas>
<div id="arrowRight">›</div>
</div>

<button id="playButton">Play</button>
<button id="menuObjectivesBtn">Objectives</button>
<button id="settingsBtn">Settings</button>

</div>

<canvas id="game"></canvas>

<div id="distance">Distance: 0 m</div>

<div id="scoreBoard">
<h2>ScoreBoard</h2>
<p>Current Distance: <span id="currentScore">0</span> m</p>
<p>Best Score: <span id="bestScore">0</span> m</p>
<p>Total Distance: <span id="totalScore">0</span> m</p>
<p>Grade: <span id="grade">-</span></p>
</div>

<div id="objectifList">

<div id="objectifPanel">

<h2>Objectives</h2>

<p id="totalDistanceDisplay"></p>

<h3>Grades</h3>
<ul id="objectifItems"></ul>

<h3>Rockets</h3>
<ul id="rocketItems"></ul>

<button id="closeObjectifs">Close</button>

</div>

</div>

<div id="settingsPanel">

<div id="settingsPanelContent">

<h2>Settings</h2>

<button id="toggleMusic">Music: ON</button>

<button id="resetProgress">Reset Progress</button>

<button id="closeSettings">Close</button>

</div>

</div>

<div id="gameOverText">GAME OVER</div>

<button id="rejouer">Replay</button>
<button id="objectifsBtn">Objectives</button>
<button id="shareScore">Share Score</button>

<div id="success-banner"></div>

<div id="milestoneMessage"></div>
<div id="levelFlash"></div>

<audio id="gameMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script src="game.js"></script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("sw.js").then(
      function (registration) {
        console.log("Service Worker enregistré", registration);
      },
      function (err) {
        console.log("Erreur Service Worker", err);
      }
    );
  });
}
</script>  

</body>
</html>
