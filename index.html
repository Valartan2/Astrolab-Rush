<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>AstroLab Rush</title>

  <!-- 🔗 Lien vers le manifest -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#001122" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="/icon-180.png">

  <style>
    /* ✅ Styles iOS : suppression pastille et sélection */
    html, body {
      margin: 0; padding: 0; overflow: hidden;
      background: linear-gradient(to top, #001122, #002233);
      font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;

      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    * {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body {
  background: #001122; /* même couleur que ton espace */
}

    canvas {
      display: block;
      background: linear-gradient(to top, #000000, #222222);
      outline: none;
      touch-action: none;
    }

 canvas {
  position: fixed;
  top: 0;
  left: 0;
}
@media screen and (orientation: portrait) {
  /* ⚠️ UNIQUEMENT mobile */
  body.mobile::before {
    content: "🔄 Tourne ton téléphone";
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: black;
    color: white;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }

  body.mobile canvas {
    display: none;
  }
}

    
    #gameTitle {
      font-size: 48px;
      color: white;
      text-shadow: 2px 2px 4px black;
      margin-bottom: 20px;
      font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
      user-select: none;
    }

  #rejouer, #shareScore, #objectifsBtn, #backToMenu {
  font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
  font-weight: bold;

  font-size: 22px;
  padding: 10px 20px;

  border-radius: 12px;
  border: 3px solid black;

  cursor: pointer;

  box-shadow: 3px 3px 0 black;

  text-transform: uppercase;
}
    

    #shareScore {
  white-space: nowrap;
  min-width: 180px;
}

    #playButton:hover,
    #rejouer:hover,
    #shareScore:hover {
      background: #ff8800;
      transform: translateY(-2px);
      box-shadow: 6px 6px 0 black;
    }

    #menu {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

    #menuImage {
      display: block;
      margin: 0 auto 50px auto;
      max-width: 200px;
       width: 30vw;
  max-width: 180px;
  min-width: 120px;
      height: auto;
      max-height: 150px;
      object-fit: contain;
    }

   


    #menuRocket{
width:220px;
height:160px;
margin:20px auto;
display:block;
background:transparent;
}

 #rocketSelector{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
margin:10px auto 25px auto;
}

#arrowLeft,
#arrowRight{
font-size:46px;
color:white;

cursor:pointer;
user-select:none;

opacity:0.6;
transition:opacity 0.2s, transform 0.2s;
}

#arrowLeft:hover,
#arrowRight:hover{
opacity:1;
transform:scale(1.2);
}  

 #menuObjectivesBtn{
font-family:'Comic Sans MS','Arial Rounded MT Bold',sans-serif;
font-weight:bold;
font-size:22px;
padding:12px 30px;
margin-top:12px;

background:#ffaa00;
color:black;

border:4px solid black;
border-radius:15px;

cursor:pointer;

box-shadow:4px 4px 0 black;

display:block;
margin:15px auto;   
width:200px;

text-transform:uppercase;
}


#menuObjectivesBtn:hover{
background:#ff8800;
transform:translateY(-2px);
box-shadow:6px 6px 0 black;
}
    
    #distance {
      position: absolute;
      top: 10px;
      left: 20px;
      color: #003300;
      font-size: 24px;
      background: #b6fcb6;
      padding: 10px 20px;
      border-radius: 15px;
      border: 3px solid black;
      box-shadow: 3px 3px 0 black;
      z-index: 10;
      font-weight: bold;
      display: none;
    }

    #levelFlash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:cyan;
opacity:0;
pointer-events:none;
z-index:998;
transition:opacity 0.15s;
}


    #gameOverText {
      position: absolute;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 48px;
      color: #ff3b3b;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
      display: none;
      z-index: 16;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.05); }
    }

    @keyframes scorePulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

.distancePulse {
  animation: scorePulse 0.4s ease;
}

   #scoreBoard {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  width: 320px;
  max-width: 90vw;

  max-height: 80vh;
  overflow-y: auto;
}

    #scoreBoard h2 {
      margin: 0 0 10px 0;
      font-size: 28px;
      color: #444;
    }

    #scoreBoard p {
      margin: 8px 0;
      font-size: 22px;
    }

    #shareScore {
  font-size: 24px;
  padding: 10px 20px;
  border-radius: 12px;
  border: 3px solid black;
  background: #00cfcf;
  color: black;
  cursor: pointer;
  display: none;
  box-shadow: 3px 3px 0 black;
}

    #shareScore:hover {
      background: #00cfcf;
      transform: translateX(-50%) translateY(-2px);
      box-shadow: 6px 6px 0 black;
    }

   #objectifsBtn {
  font-size: 24px;
  font-weight: bold;
  padding: 10px 20px;
  border-radius: 12px;
  border: 3px solid black;
  background: #fff04f;
  color: black;
  font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
  cursor: pointer;
  display: none;
  box-shadow: 3px 3px 0 black;
  text-transform: uppercase;
}
    #objectifList {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
}

#objectifPanel {

background: linear-gradient(180deg,#fffbe6,#f3edd6);

padding: 25px;

border-radius: 25px;

border: 4px solid black;

box-shadow: 0 12px 30px rgba(0,0,0,0.45);

width: 340px;
max-width: 90vw;

max-height: 80vh;
overflow-y: auto;

font-size: 18px;

}

#objectifPanel ul {
  list-style: none;
  padding: 0;
}

#objectifPanel li {
  font-size: 18px;
  padding: 6px 0;
}

#objectifPanel h2 {
  text-align: center;
  margin-bottom: 10px;
}    

#objectifPanel h3 {
  margin: 16px 0 8px;
  font-size: 20px;
}

#objectifPanel {
  padding: 25px;
}    

#closeObjectifs{
margin:20px auto 0 auto; /* 🔥 centre */
display:block;

font-size:20px;
padding:10px 20px;
border-radius:12px;
border:3px solid black;
background:#ffaa00;
font-weight:bold;
cursor:pointer;
box-shadow:3px 3px 0 black;
}

#totalDistanceDisplay {
  margin: 10px 0 14px;
  font-size: 18px;
  color: #333;
}

.rocket-item{
font-size:17px;

padding:12px 18px; 

border-radius:12px;

margin-bottom:12px;

border:3px solid black;

background:white;

font-weight:bold;

display: flex;           /* 🔥 IMPORTANT */
  align-items: center;  
}

.rocket-item {
  padding-left: 22px; /* 🔥 FORCE espace à gauche */
}    



.rocket-unlocked{

background:linear-gradient(90deg,#c8ffd8,#a9f0c0);

}

.rocket-locked{

background:#e5e5e5;
color:#777;

opacity:0.7;

}

.rocket-selected {
  outline: 3px solid #00cfcf;
  background: #cfffff;
}    

.objectif-achieved::before {
  content: "✅ ";
  color: green;
}


#objectifsBtn:hover {
  background: #fdd835;
  transform: translateX(-50%) translateY(-2px);
  box-shadow: 6px 6px 0 black;
}


    #success-banner {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: rgba(0, 0, 0, 0.85);
      color: #00ffcc;
      padding: 12px 24px;
      border-radius: 16px;
      font-size: 20px;
      font-weight: bold;
      display: none;
      z-index: 999;
      box-shadow: 0 0 12px rgba(0, 255, 204, 0.5);
      text-align: center;
    }


    #rejouer {
  font-size: 24px;
  padding: 10px 20px;
  color: black;
  background: #ffaa00;
  border: 3px solid black;
  border-radius: 12px;
  cursor: pointer;
  box-shadow: 3px 3px 0 black;
  text-transform: uppercase;
  display: none;
}

    #rejouer:hover {
      background: #ff8800;
      transform: translateX(-50%) translateY(-2px);
      box-shadow: 6px 6px 0 black;
    }

    #menuStars {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      background: #001122;
    }

    #milestoneMessage{
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
font-size:42px;
color:white;
font-weight:bold;
text-shadow:0 0 10px cyan;
opacity:0;
transition:opacity 0.4s;
will-change: opacity;
pointer-events:none;
z-index:999;

white-space:nowrap;
text-align:center;
max-width:95vw;
}

    @media (max-width: 768px) {
      #playButton, #rejouer, #shareScore {
        font-size: 20px;
        padding: 10px 25px;
        width: auto;
      } 
      #milestoneMessage{
        font-size:22px;
      }
    }
    

      
      #gameOverText {
        font-size: 32px;
      }      
    }
#settingsBtn{
font-family:'Comic Sans MS','Arial Rounded MT Bold',sans-serif;
font-weight:bold;
font-size:22px;
padding:12px 30px;
margin-top:12px;

background:#ffaa00;
color:black;

border:4px solid black;
border-radius:15px;

cursor:pointer;

box-shadow:4px 4px 0 black;

display:block;
margin:15px auto;
width:200px;

text-transform:uppercase;
}

#settingsPanel{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
}

#settingsBox{
background:linear-gradient(180deg,#fffbe6,#f3edd6);
padding:25px;
border-radius:25px;
border:4px solid black;
text-align:center;
width:320px;
}

#settingsBox button{
display:block;
margin:12px auto;
font-size:20px;
padding:10px 20px;
border-radius:12px;
border:3px solid black;
background:#ffaa00;
cursor:pointer;
font-weight:bold;
}

.menuBtn {
  font-family: 'Comic Sans MS','Arial Rounded MT Bold',sans-serif;
  font-weight: bold;
  font-size: 22px;
  padding: 12px 30px;

  background: #ffaa00;
  color: black;

  border: 4px solid black;
  border-radius: 15px;

  cursor: pointer;

  box-shadow: 4px 4px 0 black;

  display: block;
  margin: 15px auto;
  width: 200px;

  text-transform: uppercase;

  transition: transform 0.2s, box-shadow 0.2s;
}

.menuBtn:hover {
  background: #ff8800;
  transform: translateY(-2px);
  box-shadow: 6px 6px 0 black;
}

.menuBtn:active {
  transform: translateY(2px);
  box-shadow: 2px 2px 0 black;
}   

    #backToMenu {
  font-size: 22px;
  padding: 10px 20px;
  border-radius: 12px;
  border: 3px solid black;
  background: #ffaa00;
  color: black;
  cursor: pointer;
  display: none;
  box-shadow: 3px 3px 0 black;
  font-family: 'Comic Sans MS','Arial Rounded MT Bold',sans-serif;
  font-weight: bold;
  text-transform: uppercase;
}

#backToMenu:hover {
  background: #ff8800;
  transform: translateX(-50%) translateY(-2px);
  box-shadow: 6px 6px 0 black;
}   

#progressLabel {
  position: absolute;
  top: 50px;
  right: 20px;
  font-size: 16px;
  color: white;
  font-weight: bold;
  text-shadow: 2px 2px 0 black;
  z-index: 10;
  display: none;
}

/* 🔥 LE PLUS IMPORTANT */
#progressContainer {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 220px;
  height: 24px;

  background: rgba(255,255,255,0.2);
  border: 4px solid black;
  border-radius: 14px;

  overflow: hidden;
  box-shadow: 4px 4px 0 black;

  z-index: 10;
  display: none;
}
    #progressContainer {
  transform: translateZ(0); /* 🔥 force rendu GPU propre */
}

#progressBar {
  height: 100%;
  width: 0%;

  background: linear-gradient(to right, #00ffcc, #00ccff);

  display: block;

  min-height: 100%;   /* 🔥 FIX MOBILE */
  max-height: 100%;   /* 🔥 FIX MOBILE */

  transform: scaleY(1.01); /* 🔥 petit hack anti-compression */
}

#wordDisplay {
  position: absolute;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);

  font-size: 22px;
  color: white;
  font-weight: bold;

  background: rgba(0,0,0,0.6);
  padding: 6px 14px;
  border-radius: 12px;
  border: 2px solid white;

  z-index: 10;
  display: none;
}

.mobile #scoreBoard {
  width: 90%;
  max-width: 320px;
  padding: 15px;
}

.mobile #scoreBoard button {
  display: block;
  width: 100%;
  margin: 8px 0;
  font-size: 16px;
  padding: 10px;
}

.mobile #scoreBoard h2 {
  font-size: 20px;
}

.mobile #scoreBoard p {
  font-size: 14px;
}

   


    .mobile #distance {
  font-size: 14px;
  padding: 6px 10px;
}

.mobile #progressBar {
  height: 8px;
}

.mobile #progressLabel {
  font-size: 12px;
}

.mobile #wordDisplay {
  font-size: 14px;
}
    .mobile #progressBarContainer {
  width: 140px;
}


#scoreBoard button {
  width: 100%;
  max-width: 220px;
}

    /* 🔥 MODE ARCADE MOBILE PAYSAGE */
@media screen and (max-width: 900px) and (orientation: landscape) {

  #menu {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px;
    max-height: 100vh;
    overflow: hidden;
  }

  #gameTitle {
    font-size: 20px;
    margin: 0;
  }

  #menuImage {
    width: 90px;
    margin: 5px 0;
  }

  #menuRocket {
    width: 120px;
    height: 80px;
  }

  .menuBtn {
    width: 160px;
    font-size: 14px;
    padding: 8px;
  }

  #gameOverText {
    top: 8%;
    font-size: 24px;
  }

  #scoreBoard {
    position: fixed;
    top: 52%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.85);

    width: 260px;
    padding: 12px;
    font-size: 14px;
    gap: 6px;
  }

  #scoreBoard h2 {
    font-size: 16px;
    margin: 0;
  }

  #scoreBoard p {
    font-size: 13px;
    margin: 2px 0;
  }

  #scoreBoard button {
    width: 180px;
    font-size: 14px;
    padding: 8px;
  }

}

    
  </style>
</head>
<body>
  <canvas id="menuStars"></canvas>

  <div id="menu">
  <h1 id="gameTitle">AstroLab Rush</h1>

  <img id="menuImage" src="menu.png" alt="Image menu" />

 <div id="rocketSelector">

 <div id="arrowLeft">‹</div>

  <canvas id="menuRocket"></canvas>

  <div id="arrowRight">›</div>

</div>

  <button id="playButton" class="menuBtn">Play</button>
<button id="menuObjectivesBtn" class="menuBtn">Objectives</button>
<button id="settingsBtn" class="menuBtn">Settings</button>

</div>

  <canvas id="game"></canvas>

  <div id="distance">Distance: 0 m</div>

  <div id="wordDisplay">G _ _ _ _ _</div>

<div id="progressLabel">Next Grade</div>
<div id="progressContainer">
  <div id="progressBar"></div>
</div>

<!-- 🆕 Tableau de score -->
<div id="scoreBoard">
  <h2>ScoreBoard</h2>

  <p><strong>Current Distance:</strong> <span id="currentScore">0</span> m</p>
  <p><strong>Best Score:</strong> <span id="bestScore">0</span> m</p>
  <p><strong>Total Distance:</strong> <span id="totalScore">0</span> m</p>
  <p><strong>Grade:</strong> <span id="grade">-</span></p>

  <!-- 🔥 BOUTONS INTÉGRÉS -->
  <button id="rejouer">Replay</button>
  <button id="objectifsBtn">Objectives</button>
  <button id="shareScore">Share Score</button>
  <button id="backToMenu">Menu</button>
</div>

<div id="objectifList" style="display: none;">
  <div id="objectifPanel">
    <h2>Objectives</h2>
    <p id="totalDistanceDisplay">Total distance: 0 m</p>

    <h3>Grades</h3>
    <ul id="objectifItems"></ul>

    <h3>Rockets</h3>
    <ul id="rocketItems"></ul>

    <button id="closeObjectifs">Fermer</button>
  </div>
</div>

<div id="gameOverText">GAME OVER</div>

<div id="success-banner"></div>
 
  
  <audio id="gameMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>
<div id="milestoneMessage"></div> 
<div id="levelFlash"></div>

<div id="settingsPanel" style="display:none;">
  <div id="settingsBox">

    <h2>Settings</h2>

    <button id="toggleMusic">Music: ON</button>

    <button id="resetGameBtn">Reset Game</button>

    <button id="closeSettings">Close</button>

  </div>
</div>




  
  <script src="game.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").then(
          function (registration) {
            console.log("✅ Service Worker enregistré :", registration);
          },
          function (err) {
            console.error("❌ Erreur d'enregistrement du Service Worker :", err);
          }
        );
      });
    }
  </script>
 
</body>
</html>
