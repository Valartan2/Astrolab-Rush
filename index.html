<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>AstroLab Rush</title>

  <!-- 🔗 Manifest -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#001122" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="/icon-180.png">

  <style>
    /* ================= GLOBAL ================= */

    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: linear-gradient(to top, #001122, #002233);
      font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;

      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    * {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    canvas {
      display: block;
      background: linear-gradient(to top, #000000, #222222);
      outline: none;
      touch-action: none;
    }

    /* ================= MOBILE ROTATION ================= */

    @media screen and (orientation: portrait) {
      body.mobile::before {
        content: "🔄 Tourne ton téléphone";
        position: fixed;
        inset: 0;
        background: black;
        color: white;
        font-size: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      body.mobile canvas {
        display: none;
      }
    }

    /* ================= MENU ================= */

    #menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
    }

    #gameTitle {
      font-size: 48px;
      color: white;
      text-shadow: 2px 2px 4px black;
      margin-bottom: 20px;
    }

    #menuImage {
      display: block;
      margin: 0 auto 50px;
      max-width: 200px;
      width: 50vw;
    }

    #menuRocket {
      width: 220px;
      height: 160px;
      margin: 20px auto;
      display: block;
    }

    #rocketSelector {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    #arrowLeft, #arrowRight {
      font-size: 46px;
      color: white;
      cursor: pointer;
      opacity: 0.6;
    }

    #arrowLeft:hover, #arrowRight:hover {
      opacity: 1;
      transform: scale(1.2);
    }

    /* ================= BUTTONS ================= */

    .menuBtn,
    #rejouer,
    #shareScore,
    #objectifsBtn,
    #backToMenu {
      font-family: inherit;
      font-weight: bold;
      font-size: 22px;
      padding: 12px 30px;
      background: #ffaa00;
      border: 4px solid black;
      border-radius: 15px;
      cursor: pointer;
      box-shadow: 4px 4px 0 black;
      text-transform: uppercase;
      margin: 15px auto;
      display: block;
      width: 200px;
    }

    .menuBtn:hover,
    #rejouer:hover,
    #shareScore:hover {
      background: #ff8800;
      transform: translateY(-2px);
      box-shadow: 6px 6px 0 black;
    }

    /* ================= HUD ================= */

    #distance {
      position: absolute;
      top: 10px;
      left: 20px;
      background: #b6fcb6;
      padding: 10px 20px;
      border-radius: 15px;
      border: 3px solid black;
      font-weight: bold;
      display: none;
    }

    #wordDisplay {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      padding: 6px 14px;
      border-radius: 12px;
      border: 2px solid white;
      display: none;
    }

    /* ================= PROGRESS BAR ================= */

    #progressContainer {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 220px;
      height: 24px;
      background: rgba(255,255,255,0.2);
      border: 4px solid black;
      border-radius: 14px;
      overflow: hidden;
      display: none;
    }

    #progressBar {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, #00ffcc, #00ccff);
      transform: scaleY(1.01);
    }

    /* ================= GAME OVER ================= */

    #gameOverText {
      position: absolute;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 48px;
      color: #ff3b3b;
      display: none;
    }

    /* ================= SCORE ================= */

    #scoreBoard {
      position: absolute;
      top: 25%;
      left: 50%;
      transform: translate(-50%);
      background: #fffbe6;
      padding: 20px;
      border-radius: 20px;
      border: 5px solid black;
      text-align: center;
      display: none;
      width: 340px;
      max-width: 90vw;
    }

    /* ================= SETTINGS ================= */

    #settingsPanel {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
    }

    #settingsBox {
      background: #fffbe6;
      padding: 25px;
      border-radius: 25px;
      border: 4px solid black;
      text-align: center;
      width: 320px;
    }

  </style>
</head>

<body>

  <canvas id="menuStars"></canvas>

  <!-- ================= MENU ================= -->

  <div id="menu">
    <h1 id="gameTitle">AstroLab Rush</h1>

    <img id="menuImage" src="menu.png" />

    <div id="rocketSelector">
      <div id="arrowLeft">‹</div>
      <canvas id="menuRocket"></canvas>
      <div id="arrowRight">›</div>
    </div>

    <button id="playButton" class="menuBtn">Play</button>
    <button id="menuObjectivesBtn" class="menuBtn">Objectives</button>
    <button id="settingsBtn" class="menuBtn">Settings</button>
  </div>

  <!-- ================= GAME ================= -->

  <canvas id="game"></canvas>

  <div id="distance">Distance: 0 m</div>
  <div id="wordDisplay">G _ _ _ _</div>

  <div id="progressContainer">
    <div id="progressBar"></div>
  </div>

  <!-- ================= SCORE ================= -->

  <div id="scoreBoard">
    <h2>ScoreBoard</h2>
    <p>Current: <span id="currentScore">0</span></p>
    <p>Best: <span id="bestScore">0</span></p>

    <button id="rejouer">Replay</button>
    <button id="objectifsBtn">Objectives</button>
    <button id="shareScore">Share</button>
    <button id="backToMenu">Menu</button>
  </div>

  <div id="gameOverText">GAME OVER</div>

  <!-- ================= SETTINGS ================= -->

  <div id="settingsPanel">
    <div id="settingsBox">
      <h2>Settings</h2>
      <button id="toggleMusic">Music</button>
      <button id="resetGameBtn">Reset</button>
      <button id="closeSettings">Close</button>
    </div>
  </div>

  <script src="game.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js");
      });
    }
  </script>

</body>
</html>
